<svg viewBox="0 0 800 750" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
    <filter id="shadow-lg" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <radialGradient id="grad-center" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4299e1"/>
      <stop offset="100%" stop-color="#2b6cb0"/>
    </radialGradient>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#3182ce" stroke-width="1"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#38a169" stroke-width="1"/>
    </marker>
    <marker id="arr-gold" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#d69e2e" stroke-width="1"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#805ad5" stroke-width="1"/>
    </marker>
  </defs>

  <!-- Titulo -->
  <text x="400" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a202c">Red de Factores de Abandono Universitario</text>
  <text x="400" y="46" text-anchor="middle" font-size="11" fill="#718096">Adaptado de McNeill (2010) | Variables del dataset UJI (2010-2021) mapeadas a zonas de interaccion</text>

  <!-- Anillo exterior -->
  <circle cx="400" cy="400" r="320" fill="#f7fafc" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="8,4"/>

  <!-- ZONA ACADEMICA (arriba) -->
  <path d="M 120,280 A 300,300 0 0,1 680,280 L 625,280 A 240,240 0 0,0 175,280 Z" fill="#ebf8ff" opacity="0.4" stroke="#90cdf4" stroke-width="1"/>
  <text x="400" y="95" text-anchor="middle" font-weight="bold" font-size="14" fill="#2c5282">ZONA ACADEMICA</text>
  <text x="400" y="110" text-anchor="middle" font-size="10" fill="#4a90d9">9 variables — rendimiento, acceso y programa</text>

  <!-- Nodos academicos fila 1 -->
  <circle cx="225" cy="145" r="38" fill="#dbeafe" stroke="#3182ce" stroke-width="2" filter="url(#shadow)"/>
  <text x="225" y="141" text-anchor="middle" font-weight="bold" font-size="10" fill="#1e40af">Nota</text>
  <text x="225" y="153" text-anchor="middle" font-size="9" fill="#3b82f6">acceso</text>

  <circle cx="340" cy="130" r="38" fill="#dbeafe" stroke="#3182ce" stroke-width="2" filter="url(#shadow)"/>
  <text x="340" y="126" text-anchor="middle" font-weight="bold" font-size="10" fill="#1e40af">Nota</text>
  <text x="340" y="138" text-anchor="middle" font-size="9" fill="#3b82f6">1er anio</text>

  <circle cx="460" cy="130" r="38" fill="#dbeafe" stroke="#3182ce" stroke-width="2" filter="url(#shadow)"/>
  <text x="460" y="126" text-anchor="middle" font-weight="bold" font-size="10" fill="#1e40af">Creditos</text>
  <text x="460" y="138" text-anchor="middle" font-size="9" fill="#3b82f6">superados</text>

  <circle cx="575" cy="145" r="38" fill="#dbeafe" stroke="#3182ce" stroke-width="2" filter="url(#shadow)"/>
  <text x="575" y="141" text-anchor="middle" font-weight="bold" font-size="10" fill="#1e40af">Nota</text>
  <text x="575" y="153" text-anchor="middle" font-size="9" fill="#3b82f6">selectividad</text>

  <!-- Nodos academicos fila 2 -->
  <circle cx="170" cy="230" r="35" fill="#dbeafe" stroke="#3182ce" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="170" y="233" text-anchor="middle" font-size="10" fill="#1e40af">Titulacion</text>

  <circle cx="290" cy="215" r="32" fill="#dbeafe" stroke="#3182ce" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="290" y="218" text-anchor="middle" font-size="10" fill="#1e40af">Rama</text>

  <circle cx="400" cy="210" r="35" fill="#dbeafe" stroke="#3182ce" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="207" text-anchor="middle" font-size="10" fill="#1e40af">Via de</text>
  <text x="400" y="219" text-anchor="middle" font-size="10" fill="#1e40af">acceso</text>

  <circle cx="510" cy="215" r="35" fill="#dbeafe" stroke="#3182ce" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="510" y="212" text-anchor="middle" font-size="10" fill="#1e40af">Univ.</text>
  <text x="510" y="224" text-anchor="middle" font-size="10" fill="#1e40af">origen</text>

  <circle cx="620" cy="235" r="32" fill="#dbeafe" stroke="#3182ce" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="620" y="232" text-anchor="middle" font-size="9" fill="#1e40af">Orden</text>
  <text x="620" y="243" text-anchor="middle" font-size="9" fill="#1e40af">preferencia</text>

  <!-- Conexiones entre nodos academicos -->
  <line x1="263" y1="145" x2="302" y2="135" stroke="#90cdf4" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="378" y1="130" x2="422" y2="130" stroke="#90cdf4" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="225" y1="183" x2="200" y2="200" stroke="#90cdf4" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Flechas academicas al estudiante -->
  <line x1="340" y1="168" x2="375" y2="355" stroke="#3182ce" stroke-width="1.2" opacity="0.35" marker-end="url(#arr-blue)"/>
  <line x1="460" y1="168" x2="420" y2="355" stroke="#3182ce" stroke-width="1.2" opacity="0.35" marker-end="url(#arr-blue)"/>
  <line x1="290" y1="247" x2="365" y2="365" stroke="#3182ce" stroke-width="1" opacity="0.25" marker-end="url(#arr-blue)"/>
  <line x1="510" y1="250" x2="430" y2="365" stroke="#3182ce" stroke-width="1" opacity="0.25" marker-end="url(#arr-blue)"/>

  <!-- ZONA PERSONAL (izquierda) -->
  <ellipse cx="160" cy="480" rx="135" ry="110" fill="#f0fff4" opacity="0.4" stroke="#9ae6b4" stroke-width="1"/>
  <text x="160" y="385" text-anchor="middle" font-weight="bold" font-size="14" fill="#276749">ZONA PERSONAL</text>
  <text x="160" y="400" text-anchor="middle" font-size="10" fill="#48bb78">4 variables — identidad y origen</text>

  <circle cx="105" cy="445" r="32" fill="#d1fae5" stroke="#38a169" stroke-width="2" filter="url(#shadow)"/>
  <text x="105" y="448" text-anchor="middle" font-weight="bold" font-size="11" fill="#065f46">Sexo</text>

  <circle cx="210" cy="440" r="35" fill="#d1fae5" stroke="#38a169" stroke-width="2" filter="url(#shadow)"/>
  <text x="210" y="437" text-anchor="middle" font-weight="bold" font-size="11" fill="#065f46">Edad</text>
  <text x="210" y="449" text-anchor="middle" font-size="9" fill="#059669">entrada</text>

  <circle cx="95" cy="525" r="30" fill="#d1fae5" stroke="#38a169" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="95" y="528" text-anchor="middle" font-size="10" fill="#065f46">Pais</text>

  <circle cx="200" cy="530" r="32" fill="#d1fae5" stroke="#38a169" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="200" y="533" text-anchor="middle" font-size="10" fill="#065f46">Provincia</text>

  <line x1="137" y1="440" x2="175" y2="440" stroke="#9ae6b4" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="120" y1="500" x2="170" y2="505" stroke="#9ae6b4" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="210" y1="405" x2="360" y2="380" stroke="#38a169" stroke-width="1.2" opacity="0.35" marker-end="url(#arr-green)"/>
  <line x1="145" y1="455" x2="355" y2="395" stroke="#38a169" stroke-width="1" opacity="0.25" marker-end="url(#arr-green)"/>

  <!-- ZONA ECONOMICA (derecha) -->
  <ellipse cx="620" cy="475" rx="145" ry="110" fill="#fffff0" opacity="0.4" stroke="#f6e05e" stroke-width="1"/>
  <text x="620" y="385" text-anchor="middle" font-weight="bold" font-size="14" fill="#975a16">ZONA ECONOMICA</text>
  <text x="620" y="400" text-anchor="middle" font-size="10" fill="#d69e2e">4 variables — recursos y empleo</text>

  <circle cx="555" cy="445" r="35" fill="#fef9c3" stroke="#d69e2e" stroke-width="2" filter="url(#shadow)"/>
  <text x="555" y="441" text-anchor="middle" font-weight="bold" font-size="10" fill="#92400e">Situacion</text>
  <text x="555" y="453" text-anchor="middle" font-size="9" fill="#b45309">laboral</text>

  <circle cx="680" cy="440" r="32" fill="#fef9c3" stroke="#d69e2e" stroke-width="2" filter="url(#shadow)"/>
  <text x="680" y="437" text-anchor="middle" font-weight="bold" font-size="11" fill="#92400e">Beca</text>
  <text x="680" y="449" text-anchor="middle" font-size="9" fill="#b45309">tuvo_beca</text>

  <circle cx="565" cy="530" r="32" fill="#fef9c3" stroke="#d69e2e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="565" y="527" text-anchor="middle" font-size="10" fill="#92400e">Max</text>
  <text x="565" y="539" text-anchor="middle" font-size="10" fill="#92400e">pagos</text>

  <circle cx="685" cy="525" r="32" fill="#fef9c3" stroke="#d69e2e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="685" y="522" text-anchor="middle" font-size="9" fill="#92400e">Anios</text>
  <text x="685" y="534" text-anchor="middle" font-size="9" fill="#92400e">beca</text>

  <line x1="590" y1="445" x2="648" y2="442" stroke="#f6e05e" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="595" y1="525" x2="653" y2="525" stroke="#f6e05e" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="525" y1="430" x2="440" y2="395" stroke="#d69e2e" stroke-width="1.2" opacity="0.35" marker-end="url(#arr-gold)"/>
  <line x1="650" y1="430" x2="435" y2="400" stroke="#d69e2e" stroke-width="1" opacity="0.25" marker-end="url(#arr-gold)"/>

  <!-- ZONA TEMPORAL (abajo) -->
  <ellipse cx="390" cy="610" rx="100" ry="50" fill="#faf5ff" stroke="#d6bcfa" stroke-width="1.5"/>
  <text x="390" y="585" text-anchor="middle" font-weight="bold" font-size="13" fill="#553c9a">TEMPORAL</text>
  <text x="390" y="598" text-anchor="middle" font-size="9" fill="#805ad5">2 variables — continuidad</text>

  <circle cx="340" cy="635" r="28" fill="#ede9fe" stroke="#805ad5" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="340" y="632" text-anchor="middle" font-size="9" fill="#553c9a">Anios</text>
  <text x="340" y="643" text-anchor="middle" font-size="9" fill="#553c9a">gap</text>

  <circle cx="440" cy="635" r="30" fill="#ede9fe" stroke="#805ad5" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="440" y="630" text-anchor="middle" font-size="9" fill="#553c9a">Interrup-</text>
  <text x="440" y="641" text-anchor="middle" font-size="9" fill="#553c9a">cion</text>

  <line x1="390" y1="570" x2="400" y2="445" stroke="#805ad5" stroke-width="1.2" opacity="0.4" stroke-dasharray="5,3" marker-end="url(#arr-purple)"/>

  <!-- Flechas entre zonas -->
  <path d="M 160,370 Q 220,330 280,300" fill="none" stroke="#718096" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.25"/>
  <path d="M 620,370 Q 560,330 500,300" fill="none" stroke="#718096" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.25"/>
  <path d="M 295,530 Q 400,570 490,520" fill="none" stroke="#718096" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.25"/>

  <!-- ESTUDIANTE -->
  <circle cx="400" cy="400" r="50" fill="url(#grad-center)" stroke="#1a365d" stroke-width="3" filter="url(#shadow-lg)"/>
  <circle cx="400" cy="400" r="45" fill="none" stroke="white" stroke-width="1" opacity="0.25"/>
  <text x="400" y="395" text-anchor="middle" font-weight="bold" font-size="15" fill="white">ESTUDIANTE</text>
  <text x="400" y="413" text-anchor="middle" font-size="11" fill="#bee3f8">¿abandono?</text>

  <!-- Leyenda -->
  <rect x="100" y="695" width="600" height="38" rx="8" fill="white" stroke="#e2e8f0" filter="url(#shadow)"/>
  <circle cx="145" cy="714" r="8" fill="#dbeafe" stroke="#3182ce" stroke-width="1.5"/>
  <text x="158" y="718" font-size="10" fill="#4a5568">Academica (9)</text>
  <circle cx="262" cy="714" r="8" fill="#d1fae5" stroke="#38a169" stroke-width="1.5"/>
  <text x="275" y="718" font-size="10" fill="#4a5568">Personal (4)</text>
  <circle cx="372" cy="714" r="8" fill="#fef9c3" stroke="#d69e2e" stroke-width="1.5"/>
  <text x="385" y="718" font-size="10" fill="#4a5568">Economica (4)</text>
  <circle cx="492" cy="714" r="8" fill="#ede9fe" stroke="#805ad5" stroke-width="1.5"/>
  <text x="505" y="718" font-size="10" fill="#4a5568">Temporal (2)</text>
  <circle cx="600" cy="714" r="8" fill="#4299e1" stroke="#1a365d" stroke-width="1.5"/>
  <text x="613" y="718" font-size="10" fill="#4a5568">Target (1)</text>
</svg>
